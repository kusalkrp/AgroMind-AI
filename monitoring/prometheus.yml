global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "agromind-api"
    # "api" is the Docker Compose service name — resolves on the internal network
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
