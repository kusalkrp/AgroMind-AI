# Sri Lanka crop agronomic constraints
# Used by ValidationAgent for hard-limit checks (NOT LLM judgment)

paddy:
  name: "Paddy (Rice)"
  sinhala: "වී"
  tamil: "நெல்"
  max_nitrogen_kg_ha: 120
  ph_range: [5.5, 7.0]
  water_requirement_mm: [1200, 2000]
  temperature_range_c: [22, 32]
  suitable_seasons: ["Maha", "Yala"]
  planting_windows:
    Maha: { start_month: 10, end_month: 12 }
    Yala: { start_month: 4, end_month: 5 }
  varieties:
    improved: ["AT 362", "BG 360", "BG 379", "BG 403", "Bg 94-1"]
    traditional: ["Suwandel", "Pachchaperumal", "Kuruluthuda"]
  suitable_agro_zones: ["Wet Zone", "Intermediate Zone", "Dry Zone"]
  soil_types: ["Clay", "Clay Loam", "Silt Loam"]
  pest_alerts: ["Brown Plant Hopper", "Blast", "Sheath Blight"]

